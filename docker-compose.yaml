# version: "3.9" [obsolete ]


# Ghis: We haben hier 3 Services(API, prometheus, grafana)
services:
  api:
    build: .
    ports:
      - "8000:8000" # From DockerFile http://localhost:8000/ 
 
 # service 2:
  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./app/prometheus.yaml:/etc/prometheus.prometheus.yaml
    ports:
      - "9090:9090"  # http://localhost:9090/ 

 # services 3:
  grafana:
    image: grafana/grafana:latest
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    ports:
      - "3000:3000" # means http://localhost:3000/ 
    volumes:
      - grafana-data:/var/lib/grafana.
    depends_on:
      - prometheus  # Grafana soll starten nur wenn prometheus lauft


volumes:
   grafana-data: